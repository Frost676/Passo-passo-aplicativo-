<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tutorial do Aplicativo</title>

<style>
:root {
    --primary-color: #2563eb;
    --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
    --phone-bg: #0f172a;
    --text-main: #1e293b;
    --text-muted: #64748b;
}

*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
}

body{
    background: var(--bg-gradient);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 20px;
    color: var(--text-main);
}

h1{
    font-size: 1.8rem;
    font-weight: 700;
    margin-bottom: 4px;
    text-align: center;
}

#contador{
    color: var(--text-muted);
    font-size: 0.9rem;
    font-weight: 500;
    margin-bottom: 25px;
}

/* Moldura do Smartphone */
.phone{
    width: 340px;
    height: 680px;
    background: var(--phone-bg);
    border-radius: 44px;
    padding: 12px;
    position: relative;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3);
    transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}

.phone.landscape{
    width: 680px;
    height: 340px;
}

/* Notch Dinâmico */
.notch{
    width: 110px;
    height: 22px;
    background: #000;
    border-radius: 0 0 16px 16px;
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    transition: opacity 0.3s;
}

.phone.landscape .notch{
    opacity: 0;
    pointer-events: none;
}

/* Tela do Aparelho */
.screen{
    width: 100%;
    height: 100%;
    border-radius: 32px;
    overflow: hidden;
    background: #000;
    position: relative;
}

/* Vídeos sobrepostos (sem autoplay no HTML) */
.screen video{
    width: 100%;
    height: 100%;
    object-fit: contain;
    position: absolute;
    top: 0;
    left: 0;
    opacity: 0;
    transition: opacity 0.2s ease-in-out;
    pointer-events: none;
}

.screen video.visivel {
    opacity: 1;
    pointer-events: auto;
}

/* Navegação */
.nav{
    display: flex;
    align-items: center;
    gap: 24px;
    margin-top: 25px;
}

button{
    width: 50px;
    height: 50px;
    border: none;
    border-radius: 50%;
    font-size: 16px;
    cursor: pointer;
    background: #fff;
    color: var(--text-main);
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
}

button:hover:not(:disabled){
    transform: translateY(-2px);
    box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    color: var(--primary-color);
}

button:active:not(:disabled){
    transform: translateY(0);
}

button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
}

/* Indicadores (Dots) */
#dots{
    display: flex;
    gap: 10px;
}

.dot{
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #cbd5e1;
    cursor: pointer;
    transition: all 0.3s ease;
}

.dot:hover {
    background: #94a3b8;
}

.dot.active{
    background: var(--primary-color);
    transform: scale(1.2);
}

/* Responsividade */
@media(max-width: 768px){
    .phone{
        width: 280px;
        height: 560px;
    }

    .phone.landscape{
        width: 90vw;
        height: 45vw;
        max-height: 280px;
    }
}
</style>
</head>
<body>

<h1 id="titulo">Passo 1</h1>
<div id="contador">1 de 8</div>

<div class="phone">
    <div class="notch"></div>
    <div class="screen">
        <video id="videoA" class="visivel" muted loop playsinline></video>
        <video id="videoB" muted loop playsinline></video>
    </div>
</div>

<div class="nav">
    <button id="btn-anterior" onclick="anterior()" aria-label="Passo anterior">◀</button>
    <div id="dots"></div>
    <button id="btn-proximo" onclick="proximo()" aria-label="Próximo passo">▶</button>
</div>

<script>
const slides = [
    { video: "01.mp4", titulo: "Passo 1", orientacao: "portrait" },
    { video: "02.mp4", titulo: "Passo 2", orientacao: "portrait" },
    { video: "03.mp4", titulo: "Passo 3", orientacao: "portrait" },
    { video: "04.mp4", titulo: "Passo 4", orientacao: "portrait" },
    { video: "05.mp4", titulo: "Passo 5", orientacao: "portrait" },
    { video: "06.mp4", titulo: "Passo 6", orientacao: "landscape" },
    { video: "07.mp4", titulo: "Passo 7", orientacao: "portrait" },
    { video: "08.mp4", titulo: "Passo 8", orientacao: "portrait" }
];

let atual = 0;
let usandoVideoA = true;

function inicializarDots(){
    const dotsContainer = document.getElementById("dots");
    dotsContainer.innerHTML = "";

    slides.forEach((_, i) => {
        const dot = document.createElement("div");
        dot.className = "dot";
        if(i === atual) dot.classList.add("active");
        
        dot.addEventListener("click", () => irParaSlide(i));
        dotsContainer.appendChild(dot);
    });
}

function atualizarDots() {
    const dots = document.querySelectorAll(".dot");
    dots.forEach((dot, i) => {
        if (i === atual) {
            dot.classList.add("active");
        } else {
            dot.classList.remove("active");
        }
    });
}

function atualizar(){
    const videoA = document.getElementById("videoA");
    const videoB = document.getElementById("videoB");
    const phone = document.querySelector(".phone");
    const btnAnterior = document.getElementById("btn-anterior");
    const btnProximo = document.getElementById("btn-proximo");

    if(slides[atual].orientacao === "landscape"){
        phone.classList.add("landscape");
    } else {
        phone.classList.remove("landscape");
    }

    const videoAtivo = usandoVideoA ? videoA : videoB;
    const videoReserva = usandoVideoA ? videoB : videoA;

    // Atualiza e dá play APENAS no vídeo que está visível na tela
    if (videoAtivo.getAttribute('src') !== slides[atual].video) {
        videoAtivo.setAttribute('src', slides[atual].video);
        videoAtivo.load();
    }
    // Garante que ele comece do início e dê o play agora
    videoAtivo.currentTime = 0;
    videoAtivo.play().catch(() => {});

    // --- PRELOAD INTELIGENTE ---
    // Coloca o próximo vídeo na reserva, carrega, mas deixa pausado no início
    if (atual < slides.length - 1) {
        const proximoVideoSrc = slides[atual + 1].video;
        if (videoReserva.getAttribute('src') !== proximoVideoSrc) {
            videoReserva.setAttribute('src', proximoVideoSrc);
            videoReserva.load(); 
            videoReserva.pause(); // Força a ficar pausado enquanto carrega
            videoReserva.currentTime = 0; // Garante frame zero
        }
    }

    document.getElementById("titulo").textContent = slides[atual].titulo;
    document.getElementById("contador").textContent = `${atual + 1} de ${slides.length}`;

    btnAnterior.disabled = (atual === 0);
    btnProximo.disabled = (atual === slides.length - 1);

    atualizarDots();
}

function alternarVideos() {
    const videoA = document.getElementById("videoA");
    const videoB = document.getElementById("videoB");

    usandoVideoA = !usandoVideoA;

    if (usandoVideoA) {
        videoA.classList.add("visivel");
        videoB.classList.remove("visivel");
        videoB.pause(); 
    } else {
        videoB.classList.add("visivel");
        videoA.classList.remove("visivel");
        videoA.pause();
    }
}

function proximo(){
    if(atual < slides.length - 1){
        atual++;
        alternarVideos(); 
        atualizar();
    }
}

function anterior(){
    if(atual > 0){
        atual--;
        alternarVideos(); 
        // Quando voltamos, resetamos o src do reserva para carregar o anterior correto
        const videoReserva = usandoVideoA ? document.getElementById("videoB") : document.getElementById("videoA");
        videoReserva.removeAttribute('src'); 
        atualizar();
    }
}

function irParaSlide(index) {
    if(index === atual) return;
    atual = index;
    
    // Se o usuário pular muitos passos, limpa o reserva para não dar flash do vídeo errado
    const videoReserva = usandoVideoA ? document.getElementById("videoB") : document.getElementById("videoA");
    videoReserva.removeAttribute('src');
    
    alternarVideos();
    atualizar();
}

window.addEventListener("keydown", (e) => {
    if (e.key === "ArrowRight") proximo();
    if (e.key === "ArrowLeft") anterior();
});

// Inicialização
document.getElementById("videoA").setAttribute('src', slides[0].video);
inicializarDots();
atualizar();
</script>

</body>
</html>
